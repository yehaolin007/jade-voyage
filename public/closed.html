<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Site temporarily unavailable — Harmony Retreats</title>
  <style>
    :root {
      --navy: #071B63;
      --navy-soft: #53649B;
      --orange: #F15A24;
      --sand: #FFF6F1;
      --muted: #7F8BB1;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background:
        radial-gradient(circle at 12% 18%, rgba(241, 90, 36, 0.08), transparent 40%),
        radial-gradient(circle at 88% 82%, rgba(7, 27, 99, 0.06), transparent 42%),
        linear-gradient(180deg, var(--sand) 0%, #fff 100%);
      color: var(--navy);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }
    .shell {
      width: 100%;
      max-width: 560px;
      text-align: center;
    }
    .seal {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      background: var(--orange);
      color: #fff;
      border-radius: 16px;
      font-family: 'Noto Serif SC', 'Songti SC', serif;
      font-size: 36px;
      font-weight: 500;
      transform: rotate(-4deg);
      box-shadow: 0 16px 32px rgba(241, 90, 36, 0.24);
      margin-bottom: 36px;
    }
    .micro {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 22px;
    }
    h1 {
      font-size: clamp(32px, 5.4vw, 48px);
      font-weight: 900;
      line-height: 1.12;
      letter-spacing: -0.01em;
      margin-bottom: 18px;
    }
    .cn {
      font-size: clamp(20px, 3vw, 26px);
      font-weight: 500;
      color: var(--navy-soft);
      margin-bottom: 28px;
      font-family: 'Noto Serif SC', 'Songti SC', serif;
    }
    p {
      font-size: 16px;
      line-height: 1.65;
      color: var(--muted);
      max-width: 420px;
      margin: 0 auto 32px;
    }
    .brand {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--navy-soft);
      padding-top: 28px;
      border-top: 1px solid rgba(7, 27, 99, 0.1);
      display: inline-block;
    }
  </style>
</head>
<body>
  <main class="shell">
    <span class="seal">和</span>
    <div class="micro">— Temporarily Unavailable</div>
    <h1>We&rsquo;ll be back soon.</h1>
    <div class="cn">网站暂时关闭，稍后再访</div>
    <p>This site is paused for a brief moment. Please check back later. Thank you for your patience.</p>
    <span class="brand">Harmony Retreats · 和旅出行</span>
  </main>
</body>
</html>
