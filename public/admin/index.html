<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager · Jade Voyage</title>
    <link rel="icon" href="data:," />
    <script>
      // OAuth callback handler — must run BEFORE decap-cms.js loads so we can
      // intercept the hash before Decap routes it.
      //
      // Why same-origin redirect (not popup postMessage):
      // Worker domain (workers.dev) and site domain (pages.dev) are treated
      // as cross-origin third parties by modern browsers (Chrome storage
      // partitioning, Firefox Total Cookie Protection, Safari ITP). They
      // silently drop window.opener.postMessage() in that case — the call
      // succeeds in the popup but the main tab never sees the message.
      //
      // Instead: Worker /callback now 302-redirects the popup to
      // /admin/#auth_token=...  Both popup and main tab are now on pages.dev,
      // so window.opener.localStorage works and BroadcastChannel works.
      (function () {
        var hash = location.hash || '';

        var tokenMatch = hash.match(/auth_token=([^&]+)/);
        var errorMatch = hash.match(/auth_error=([^&]+)/);

        if (tokenMatch) {
          var token = decodeURIComponent(tokenMatch[1]);
          var user = JSON.stringify({ token: token, backendName: 'github' });

          // Write our own localStorage so a self-reload also works
          try {
            localStorage.setItem('decap-cms-user', user);
            localStorage.setItem('netlify-cms-user', user);
          } catch (_) {}

          // Tell every other /admin/ tab (same-origin BroadcastChannel)
          try {
            var bc = new BroadcastChannel('jv-auth');
            bc.postMessage({ type: 'logged-in' });
            bc.close();
          } catch (_) {}

          // Best case: we're a popup whose opener is the admin tab.
          // Same origin, so we can write its localStorage + reload it directly.
          var openerHandled = false;
          try {
            if (window.opener && !window.opener.closed) {
              window.opener.localStorage.setItem('decap-cms-user', user);
              window.opener.localStorage.setItem('netlify-cms-user', user);
              window.opener.location.reload();
              openerHandled = true;
            }
          } catch (_) {}

          if (openerHandled) {
            try { window.close(); } catch (_) {}
            // If close() is blocked, show a hint
            setTimeout(function () {
              document.body.innerHTML =
                '<p style="font:14px system-ui;padding:24px;color:#1F3A36">Signed in. You can close this tab.</p>';
            }, 400);
            return;
          }

          // Fallback: no usable opener (popup blocker, COOP, manual nav).
          // Clean the hash and reload ourselves — Decap will pick up the
          // localStorage user on next boot.
          history.replaceState(null, '', location.pathname);
          location.reload();
          return;
        }

        if (errorMatch) {
          var err = decodeURIComponent(errorMatch[1]);
          document.documentElement.innerHTML =
            '<body style="font:14px system-ui;padding:24px;color:#1F3A36;max-width:560px;margin:0 auto">' +
            '<h2 style="font-family:Georgia,serif;margin:0 0 8px">Login failed</h2>' +
            '<p style="color:#4A5C58">GitHub returned: <code>' + err.replace(/</g, '&lt;') + '</code></p>' +
            '<p><a href="/admin/" style="color:#6B9080">Try again</a></p></body>';
          return;
        }

        // Main admin page path: listen for sibling tab login broadcasts.
        try {
          var bc2 = new BroadcastChannel('jv-auth');
          bc2.addEventListener('message', function (e) {
            if (e.data && e.data.type === 'logged-in') location.reload();
          });
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.6.0/dist/decap-cms.js"></script>
  </body>
</html>
